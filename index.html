<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merchant Hunt | AI Receipt Processor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json?v=2">    
    <meta name="theme-color" content="#E6B91E">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

    <div class="app-container">
       <button onclick="window.location.href='https://audherapy.org/about.html'" 
            style="background: rgba(0, 255, 102, 0.1); border: 1px solid #00ff66; color: #00ff66; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 12px; margin-bottom: 20px; cursor: pointer;">
            🦴 RETURN TO BIO
        </button>
        

<script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
<script>
  kofiWidgetOverlay.draw('taskpuppyloona', {
    'type': 'floating-chat',
    'floating-chat.donateButton.text': 'Support the Hunt',
    'floating-chat.donateButton.background-color': '#1A1124',
    'floating-chat.donateButton.text-color': '#fff'
  });
</script>
        <header class="top-nav">
            <h1><i>MERCHANT HUNT</i></h1>
            <div class="nav-icons">
                <button id="exportBtn" class="icon-btn">📥</button>
                <button id="settingsBtn" class="icon-btn">⚙️</button>
            </div>
        </header>

        <div class="insight-card">
            <div class="insight-header">
                <span>💳 SPENDING INSIGHT</span>
                <h2 id="totalSpent">$0.00</h2>
            </div>
            <div class="time-filters">
                <button class="filter-btn active">ALL</button>
                <button class="filter-btn">MONTHLY</button>
                <button class="filter-btn">WEEKLY</button>
            </div>
        </div>

        <div class="capture-module">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
            <input type="file" id="uploadInput" accept="image/*" style="display: none;">
            
            <div class="capture-buttons">
                <button class="main-capture-btn" onclick="document.getElementById('cameraInput').click()">
                    📷
                </button>
                <button class="upload-btn" onclick="document.getElementById('uploadInput').click()">
                    📁 UPLOAD IMAGE
                </button>
                
            </div>
        </div>

       <div id="search-hub" style="max-width: 100%; margin: 20px 0; background: rgba(0,0,0,0.2); border-radius: 16px; padding: 20px; border: 1px solid #333;">
    
    <input type="text" id="master-search-input" placeholder="Enter Merchant/Item...420 blaze it o3o" 
           style="width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #111; color: #fff; font-size: 16px; box-sizing: border-box; margin-bottom: 12px;">

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button onclick="executeManualSearch()" 
                style="padding: 15px; background: #34e031b4; color: #ccc; border: 1px solid #444; border-radius: 10px; font-weight: bold; cursor: pointer;font-size: 22px;">
            🔍 Slow Bro(manual mode)
        </button>
        <button onclick="executeAiSearch()" 
                style="padding: 15px; background: #e031c6b4; color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 10px rgba(230, 185, 30, 0.2);font-size: 22px;">
            ✨ Fuckin' Send it! (AI Powered)
        </button>
    </div>

    <div id="search-results" style="margin-top: 20px; display: none; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 14px; line-height: 1.6; color: #eee;">
        </div>
</div>
        
        <div class="history-section">
            <div class="history-header">
                <span>⏱️ SECURE HISTORY</span>
                <span id="currentDateDisplay"></span>
            </div>
            <div id="receiptLog" class="log-list">
                </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/app.js"></script>

<script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
<script>
  kofiWidgetOverlay.draw('taskpuppyloona', {
    'type': 'floating-chat',
    'floating-chat.donateButton.text': 'Support me',
    'floating-chat.donateButton.background-color': '#794bc4',
    'floating-chat.donateButton.text-color': '#fff'
  });
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker Registered!'))
        .catch(err => console.log('Service Worker Failed', err));
    });
  }
</script>
</body>
</html>
