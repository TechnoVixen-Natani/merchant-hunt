<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merchant Hunt | AI Receipt Processor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <button onclick="window.location.href='https://audherapy.org/about.html'" 
            style="background: rgba(0, 255, 102, 0.1); border: 1px solid #00ff66; color: #00ff66; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 12px; cursor: pointer;">
            🦴 RETURN TO BIO
        </button>
        <header class="top-nav">
            <h1><i>MERCHANT HUNT</i></h1>
            <div class="nav-icons">
                <button id="exportBtn" class="icon-btn">📥</button>
                <button id="settingsBtn" class="icon-btn">⚙️</button>
            </div>
        </header>

        <div class="insight-card">
            <div class="insight-header">
                <span>💳 SPENDING INSIGHT</span>
                <h2 id="totalSpent">$0.00</h2>
            </div>
            <div class="time-filters">
                <button class="filter-btn active">ALL</button>
                <button class="filter-btn">MONTHLY</button>
                <button class="filter-btn">WEEKLY</button>
            </div>
        </div>

        <div class="capture-module">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
            <input type="file" id="uploadInput" accept="image/*" style="display: none;">
            
            <div class="capture-buttons">
                <button class="main-capture-btn" onclick="document.getElementById('cameraInput').click()">
                    📷
                </button>
                <button class="upload-btn" onclick="document.getElementById('uploadInput').click()">
                    📁 UPLOAD IMAGE
                </button>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Search dang ol store dude...">
        </div>

        <div class="history-section">
            <div class="history-header">
                <span>⏱️ SECURE HISTORY</span>
                <span id="currentDateDisplay"></span>
            </div>
            <div id="receiptLog" class="log-list">
                </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/app.js"></script>

<script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
<script>
  kofiWidgetOverlay.draw('taskpuppyloona', {
    'type': 'floating-chat',
    'floating-chat.donateButton.text': 'Support me',
    'floating-chat.donateButton.background-color': '#794bc4',
    'floating-chat.donateButton.text-color': '#fff'
  });
</script>
</body>
</html>
